# Application
spring.application.name=delta-scientia
server.port=8080

# H2 Database (file-based, not in-memory)
spring.datasource.url=jdbc:h2:file:./data/deltascientia_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Spring AI - Gemini
spring.ai.google.gemini.api-key=${GEMINI_API_KEY:}

# Logging
logging.level.it.deltascientia=DEBUG
logging.level.org.springframework.web=INFO