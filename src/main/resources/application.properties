# Application
spring.application.name=delta-scientia
server.port=8080

# H2 Database (file-based, not in-memory)
spring.datasource.url=jdbc:h2:file:./data/deltascientia_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# HikariCP Connection Pool
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate (schema managed by Flyway)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Spring AI - Gemini
spring.ai.google.gemini.api-key=${GEMINI_API_KEY:}

# Logging
logging.level.it.deltascientia=DEBUG
logging.level.org.springframework.web=INFO